<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Image Classifier</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <h1 class="text-center">Image Classifier</h1>

        <form class="p-3 text-center" action="/predict" method="post" enctype="multipart/form-data">
            <input class="form-control-file" type="file" name="imagefile">
            <input class="btn btn-primary mt-3" type="submit" value="Predict Image">
        </form>

        {% if prediction %}
            {% if confidence_level == "good" %}
                <div class="alert alert-success text-center" role="alert">
            {% elif confidence_level == "medium" %}
                <div class="alert alert-warning text-center" role="alert">
            {% else %}
                <div class="alert alert-danger text-center" role="alert">
            {% endif %}
                <h4 class="alert-heading">Prediction Result</h4>
                <p>{{ prediction }}</p>
            </div>
        {% endif %}
        {% if error %}
            <div class="alert alert-danger text-center" role="alert">
                {{ error }}
            </div>
        {% endif %}
    </body>
</html>
